name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: "Thanks for suggesting an improvement!"
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or problem you're facing.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How do you think this should work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you've thought of?
  - type: dropdown
    id: type
    attributes:
      label: Feature type
      options:
        - Recipe / Film simulation
        - Image processing / Engine
        - UI / UX
        - Performance
        - Other
    validations:
      required: true
