name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Thanks for taking the time to report a bug!"
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the app
        2. Upload a photo
        3. Select Classic Chrome
        4. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser & OS
      placeholder: "e.g. Chrome 124 on macOS 14"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version
      placeholder: "e.g. 1.3 (visible in Help dialog)"
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Optional. Drag and drop screenshots here.
